name: Weekly Template Update Check

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-update-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for existing open issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --label "template-update" --state open --json number --jq 'length')
          echo "exists=$existing" >> "$GITHUB_OUTPUT"

      - name: Create update check issue
        if: steps.check.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Weekly template update check" \
            --label "template-update" \
            --assignee "copilot-swe-agent" \
            --body "$(cat <<'EOF'
          Check if this template needs updates:

          1. **Framework/library versions**: Are the core dependencies on their latest stable versions? If a major version upgrade is available, update the template to use it.
          2. **Language runtime**: Is the language runtime version (in Dockerfile, config files, CI) current and supported?
          3. **Deprecated APIs or patterns**: Are there any deprecated APIs, functions, or patterns that should be replaced with modern equivalents?
          4. **Configuration best practices**: Are config files (linters, formatters, tsconfig, etc.) following current best practices?
          5. **Dockerfile**: Is the base image up to date? Are there any security or efficiency improvements?
          6. **README**: Does the README accurately reflect the current setup?

          If updates are needed, open a PR with the changes. If everything is up to date, close this issue with a comment confirming no changes are needed.
          EOF
          )"